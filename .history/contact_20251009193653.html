<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - TechAriv</title>
    <meta name="description" content="Get in touch with TechAriv to start your next web development or digital marketing project.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/footer.css">
</head>
<body>

    <!-- ================== HEADER ================== -->
    <div id="header-placeholder"></div>

    <main>
        <!-- ================== CONTACT SECTION ================== -->
        <section id="contact">
            <div class="container">
                <h2>Ready to Grow Your Business?</h2>
                <p style="text-align: center; max-width: 600px; margin: 0 auto;">Let's talk about your next project. Fill out the form below or email us directly.</p>
                <form class="contact-form" action="#" method="POST">
                    <input type="text" name="name" placeholder="Your Name" required>
                    <input type="email" name="email" placeholder="Your Email" required>
                    <textarea name="message" rows="6" placeholder="Tell us about your project..." required></textarea>
                    <button type="submit" class="cta-button">Send Message</button>
                </form>
            </div>
        </section>
    </main>

    <!-- ================== FOOTER ================== -->
    <div id="footer-placeholder"></div>

    <script src="/js/script.js"></script>
<!-- new -->
</body>
</html>
