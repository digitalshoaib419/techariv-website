<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - TechAriv</title>
    <meta name="description" content="Get in touch with TechAriv to start your next web development or digital marketing project.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/footer.css">

    <!-- Favicon -->
<link rel="icon" href="/favicon.png" type="image/x-icon">
<link rel="shortcut icon" href="/favicon.png" type="image/x-icon">

    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-HBXHFW9LXR"></script>

<style>
    :root {
        --primary-color: #0387c4;
        --accent-color: #FF8C00;
        --cta-gradient: linear-gradient(90deg, #FF8C00, #FF5500);
        --text-dark: #333333;
        --text-light: #666666;
        --bg-white: #ffffff;
        --bg-light: #f9f9f9;
        --gradient-dark: linear-gradient(135deg, #0B1120 0%, #0f172a 100%);
    }

    /* Hero Section */
    .contact-hero {
        background: var(--gradient-dark);
        padding: 3rem 5% 2rem;
        text-align: center;
        color: white;
        position: relative;
    }
    .contact-hero h1 {
        font-size: clamp(2.5rem, 5vw, 3.5rem);
        font-weight: 700;
        margin: 0 0 1rem 0;
    }

    /* Main Layout */
    .contact-section {
        padding: 3rem 5%;
        background-color: var(--bg-white);
    }
    .contact-grid {
        display: grid;
        grid-template-columns: 1fr 1.2fr;
        gap: 3rem;
        max-width: 1280px;
        margin: 0 auto;
        align-items: start;
    }

    /* Left Column */
    .section-badge {
        color: var(--accent-color);
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        font-size: 0.85rem;
        display: block;
        margin-bottom: 1rem;
    }
    .contact-heading {
        font-size: clamp(2rem, 4vw, 2.8rem);
        font-weight: 700;
        color: var(--text-dark);
        margin: 0 0 1.5rem 0;
        line-height: 1.2;
    }
    .info-list { display: flex; flex-direction: column; gap: 1.5rem; }
    .info-item { display: flex; gap: 1.5rem; }
    .info-icon {
        width: 55px; height: 55px;
        background: rgba(3, 135, 196, 0.08);
        color: var(--primary-color);
        border-radius: 16px;
        display: flex; align-items: center; justify-content: center;
        font-size: 1.3rem;
        flex-shrink: 0;
        transition: all 0.3s ease;
    }
    .info-item:hover .info-icon { background: var(--primary-color); color: white; transform: translateY(-3px); }
    .info-content h4 { margin: 0 0 0.4rem; font-size: 1.1rem; color: var(--text-dark); font-weight: 700; }
    .info-content p, .info-content a { margin: 0; color: var(--text-light); font-size: 0.95rem; line-height: 1.6; text-decoration: none; display: block; }
    .info-content a:hover { color: var(--primary-color); }

    /* Right Column - Form */
    .form-card {
        background: white; padding: 2rem; border-radius: 24px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.06); border: 1px solid rgba(0,0,0,0.03);
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .full-width { grid-column: span 2; }
    
    .form-input, .form-textarea {
        width: 100%; padding: 12px 15px; border: 1px solid #e5e7eb; border-radius: 12px;
        font-family: 'Poppins', sans-serif; font-size: 0.95rem; background: #f9fafb;
        transition: all 0.3s ease; box-sizing: border-box; color: var(--text-dark);
    }
    .form-input:focus, .form-textarea:focus {
        border-color: var(--primary-color); background: white; outline: none;
        box-shadow: 0 0 0 4px rgba(3, 135, 196, 0.1);
    }
    .form-textarea { resize: vertical; min-height: 80px; }

    .consent-check { display: flex; gap: 0.8rem; align-items: flex-start; font-size: 0.9rem; color: var(--text-light); margin: 0.5rem 0; cursor: pointer; }
    .consent-check input { margin-top: 4px; accent-color: var(--primary-color); }

    .submit-btn {
        background: var(--cta-gradient); color: white; border: none; padding: 14px 30px;
        border-radius: 50px; font-weight: 700; font-size: 1rem; cursor: pointer;
        text-transform: uppercase; width: 100%; letter-spacing: 1px;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(255, 140, 0, 0.3); }

    @media (max-width: 1024px) {
        .contact-grid { grid-template-columns: 1fr; gap: 2rem; }
        .form-card { padding: 1.5rem; }
    }
    @media (max-width: 600px) {
        .form-grid { grid-template-columns: 1fr; }
        .full-width { grid-column: span 1; }
        .contact-hero { padding: 3rem 5% 2rem; }
    }
</style>
</head>
<body>

    <!-- ================== HEADER ================== -->
    <div id="header-placeholder"></div>

    <main>
        <!-- ================== HERO SECTION ================== -->
        <section class="contact-hero">
            <h1>Contact Us</h1>
        </section>

        <!-- ================== MAIN CONTENT ================== -->
        <section class="contact-section">
            <div class="contact-grid">
                <!-- Left Column: Info -->
                <div class="contact-info-col">
                    <span class="section-badge">CONTACT US</span>
                    <h2 class="contact-heading">Get In Touch With TechAriv</h2>
                    
                    <div class="info-list">
                        <div class="info-item">
                            <div class="info-icon"><i class="fa-solid fa-location-dot"></i></div>
                            <div class="info-content">
                                <h4>Branch Office</h4>
                                <p>123 Tech Avenue, Silicon Valley,<br>CA 94043, USA</p>
                            </div>
                        </div>
                        <div class="info-item">
                            <div class="info-icon"><i class="fa-solid fa-building"></i></div>
                            <div class="info-content">
                                <h4>Head Office</h4>
                                <p>456 Innovation Drive, Tech City,<br>New York, NY 10001</p>
                            </div>
                        </div>
                        <div class="info-item">
                            <div class="info-icon"><i class="fa-solid fa-phone"></i></div>
                            <div class="info-content">
                                <h4>Phone Number</h4>
                                <p><a href="tel:+15551234567">+1 (555) 123-4567</a></p>
                                <p><a href="tel:+919876543210">+91 98765 43210</a></p>
                            </div>
                        </div>
                        <div class="info-item">
                            <div class="info-icon"><i class="fa-solid fa-envelope"></i></div>
                            <div class="info-content">
                                <h4>Email Address</h4>
                                <p><a href="mailto:info@techariv.com">info@techariv.com</a></p>
                                <p><a href="mailto:support@techariv.com">support@techariv.com</a></p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right Column: Form -->
                <div class="contact-form-col">
                    <div class="form-card">
                        <form action="#" method="POST" class="form-grid">
                            <div class="form-group">
                                <input type="text" name="firstname" class="form-input" placeholder="First Name" required>
                            </div>
                            <div class="form-group">
                                <input type="text" name="lastname" class="form-input" placeholder="Last Name" required>
                            </div>
                            <div class="form-group full-width">
                                <input type="tel" name="phone" class="form-input" placeholder="Phone Number" required>
                            </div>
                            <div class="form-group full-width">
                                <input type="email" name="email" class="form-input" placeholder="Email Address" required>
                            </div>
                            <div class="form-group full-width">
                                <input type="url" name="website" class="form-input" placeholder="Website URL (Optional)">
                            </div>
                            <div class="form-group full-width">
                                <textarea name="message" class="form-textarea" placeholder="Write your message here..." required></textarea>
                            </div>
                            
                            <div class="form-group full-width">
                                <label class="consent-check">
                                    <input type="checkbox" required>
                                    <span>I agree to the processing of personal data according to the Privacy Policy.</span>
                                </label>
                            </div>

                            <div class="form-group full-width">
                                <button type="submit" class="submit-btn">Submit Now</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- ================== FOOTER ================== -->
    <div id="footer-placeholder"></div>

    <script src="/js/script.js"></script>
<!-- new -->
</body>
</html>
